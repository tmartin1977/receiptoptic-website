<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ReceiptOptic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0B0F19;
            --bg-surface: rgba(22, 27, 42, 0.65);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary: #3B82F6;
            --card-border: #2A354F;
            --neon-cyan: #00F2FE;
            --neon-purple: #a020f0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 80px 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-surface);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00f2fe 0%, #a020f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            background: rgba(11, 15, 25, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input:focus {
            border-color: var(--neon-cyan);
        }
        .btn-primary {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--primary) 100%);
            border: none;
            border-radius: 8px;
            color: #0b0f19;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .message {
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }
        .message.error {
            color: #ff4d4d;
        }
        .message.success {
            color: #2ecc71;
        }
        .footer-links {
            margin-top: 25px;
            font-size: 13px;
        }
        .footer-links a {
            color: var(--neon-purple);
            text-decoration: none;
            font-weight: 500;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reset Password</h1>
        <p id="reset-description">Please enter a new password for your account.</p>

        <!-- Form for updating password -->
        <div id="reset-form-container">
            <input type="password" id="new-password" placeholder="New Password" required>
            <input type="password" id="confirm-password" placeholder="Confirm New Password" required>
            
            <div id="error-msg" class="message error"></div>
            <div id="success-msg" class="message success"></div>

            <button id="submit-btn" class="btn-primary" style="margin-top: 15px;" onclick="handleResetSubmit()">
                Update Password
            </button>
        </div>

        <div class="footer-links">
            <a href="index.html">Return to Home</a>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "https://lwxnuxwoskockzovmevb.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3eG51eHdvc2tvY2t6b3ZtZXZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDAzNDAsImV4cCI6MjA5NzYxNjM0MH0.5DqftWk7KKjjRn7nOa1bWDdbYTp3eQP8SUXM80hoOHU";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function verifySession() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (!session) {
                // If there's no active session (i.e. URL was loaded without tokens), inform the user
                document.getElementById('new-password').style.display = 'none';
                document.getElementById('confirm-password').style.display = 'none';
                document.getElementById('submit-btn').style.display = 'none';
                
                const desc = document.getElementById('reset-description');
                desc.innerText = "Invalid or expired password reset link. Please request a new link from the home page.";
                desc.style.color = "#ff4d4d";
            }
        }

        async function handleResetSubmit() {
            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const submitBtn = document.getElementById('submit-btn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!password) {
                errorMsg.innerText = "Please enter a new password.";
                errorMsg.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.innerText = "Passwords do not match.";
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Updating...";

            const { data, error } = await supabase.auth.updateUser({
                password: password
            });

            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = "Update Password";
            } else {
                successMsg.innerText = "Password reset successful! You can now log in using your new password.";
                successMsg.style.display = 'block';
                
                document.getElementById('new-password').style.display = 'none';
                document.getElementById('confirm-password').style.display = 'none';
                submitBtn.style.display = 'none';
                
                document.getElementById('reset-description').innerText = "Password successfully changed.";
            }
        }

        // Run check on load
        verifySession();
    </script>
</body>
</html>
